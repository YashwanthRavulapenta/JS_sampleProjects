<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <style>
        body{
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .calculator_box{
            background-color: bisque;
            width: 300px;
            height: 370px;
            border: 2px solid rgb(79, 54, 6);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            justify-content: space-evenly;
            row-gap: 10px;
            align-items: center;
        }
        .input_feild{
            color: rgb(13, 131, 205);
            background-color:rgb(186, 255, 232);
            font-size: 19px;
            width: 240px;
            height: 40px;
            border-radius: 6px;
            border: 1px solid rgb(105, 114, 111);
        }
        .all_buttons_box{
            width: 90%;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            column-gap: 8px;
            row-gap: 8px;
        }
        .each_button{
            background-color: rgb(186, 255, 232);
            width: 55px;
            height: 55px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid rgb(43, 70, 57);
            border-radius: 4px;
            font-size: 17px;
        }
        .each_button:hover{
            cursor: pointer;
        }
        .each_button:active{
            font-size: 13px;
        }
        
    </style>
</head>
<body>
    <div>
        <div class="calculator_box">
            <div class="input_feild_box">
                <input type="text" placeholder="" class="input_feild" id="inputHolder">
            </div>
            <div class="all_buttons_box">
                <button class="each_button" onclick="pressed('7')">7</button>
                <button class="each_button" onclick="pressed('8')">8</button>
                <button class="each_button" onclick="pressed('9')">9</button>
                <button class="each_button" onclick="pressed('+')">+</button>
                <button class="each_button" onclick="pressed('4')">4</button>
                <button class="each_button" onclick="pressed('5')">5</button>
                <button class="each_button" onclick="pressed('6')">6</button>
                <button class="each_button" onclick="pressed('-')">-</button>
                <button class="each_button" onclick="pressed('1')">1</button>
                <button class="each_button" onclick="pressed('2')">2</button>
                <button class="each_button" onclick="pressed('3')">3</button>
                <button class="each_button" onclick="pressed('*')">*</button>
                <button class="each_button" onclick="pressedForEmpty()">C</button>
                <button class="each_button" onclick="pressed('0')">0</button>
                <button class="each_button" onclick="calculate()">=</button>
                <button class="each_button" onclick="pressed('/')">/</button> 
            </div>
            <div>
                <button onclick="clearBack()">backspace</button>
            </div>
        </div>
    </div>

    <script>
        let str = "";
        function pressed(i){
            str = str + i;
            document.getElementById('inputHolder').value = str;
        }
        function pressedForEmpty(){
            document.getElementById('inputHolder').value = '';
            str = "";
        }
        function calculate(){
            let result = eval(str);
            document.getElementById('inputHolder').value = result;
            str = result.toString()
        }
        function clearBack() {
            str = str.slice(0, -1);
            document.getElementById('inputHolder').value = str;
        }

    </script>
</body>
</html>
