<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProductCart</title>
    <style>
        .main_section{
            display: flex;
            align-items: center;
            justify-content: space-evenly;
            gap: 20px;
            padding: 40px;
            background-color: rgb(184, 178, 178);
            border-radius: 20px;
            box-sizing: border-box;
        }
        .cart_image{
            width: 80px;
            height: auto;
        }
        .cart_image_box{
            position: relative;
        }
        .counter_box{
            position: absolute;
            top: 0;
            left: 60px;
            width: 30px;
            height:30px ;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: rgb(78, 78, 76);
            border-radius: 50%;
            display: none;
            font-weight: 500;
        }
        .addToCart_button{
            padding: 8px 20px 8px 20px;
            background-color: rgb(0, 96, 250);
            color: white;
            border: 1px solid rgb(50, 67, 255);
            border-radius: 10px;
            font-size: 15px;
            transition: font-size 0.3s , color 0.4s;
        }
        .addToCart_button:active{
            font-size: 14px;
            color: rgb(21, 36, 21);
        }
        .reset_button{
            padding: 8px 20px 8px 20px;
            background-color: rgb(233, 148, 0);
            color: rgb(255, 252, 252);
            border: 1px solid rgb(50, 102, 125);
            border-radius: 10px;
            font-size: 15px;
            transition: font-size 0.3s , color 0.3s;
        }
        .reset_button:active{
            font-size: 14px;
            color: rgb(95, 138, 17);
        }
        .removeOne_button{
            padding: 8px 20px 8px 20px;
            background-color: rgba(128, 220, 110, 0.973);
            color: rgb(43, 25, 25);
            border: 1px solid rgb(50, 102, 125);
            border-radius: 10px;
            font-size: 15px;
            transition: font-size 0.3s , color 0.3s;            
        }
        .removeOne_button:active{
            font-size: 14px;    
            color: rgb(255, 253, 253);
        }

    </style>
</head>
<body>
    <main class="main_section">
        <div>
            <button onclick="addToCart()" id="addToCart" class="addToCart_button">Add to cart</button>
            <button onclick="removeOne()" class="removeOne_button">Remove one</button>
            <button onclick="reset()" class="reset_button">Reset</button>
        </div>
        <div class="cart_image_box">
            <svg class="cart_image" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640"><!--!Font Awesome Free v7.3.0 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license/free Copyright 2026 Fonticons, Inc.--><path fill="rgb(0, 93, 255)" d="M0 72C0 58.7 10.7 48 24 48L69.3 48C96.4 48 119.6 67.4 124.4 94L124.8 96L312 96L312 198.1L281 167.1C271.6 157.7 256.4 157.7 247.1 167.1C237.8 176.5 237.7 191.7 247.1 201L319.1 273C328.5 282.4 343.7 282.4 353 273L425 201C434.4 191.6 434.4 176.4 425 167.1C415.6 157.8 400.4 157.7 391.1 167.1L360.1 198.1L360.1 96L537.5 96C557.5 96 572.6 114.2 568.9 133.9L537.8 299.8C532.1 330.1 505.7 352 474.9 352L171.3 352L176.4 380.3C178.5 391.7 188.4 400 200 400L456 400C469.3 400 480 410.7 480 424C480 437.3 469.3 448 456 448L200.1 448C165.3 448 135.5 423.1 129.3 388.9L77.2 102.6C76.5 98.8 73.2 96 69.3 96L24 96C10.7 96 0 85.3 0 72zM160 528C160 501.5 181.5 480 208 480C234.5 480 256 501.5 256 528C256 554.5 234.5 576 208 576C181.5 576 160 554.5 160 528zM384 528C384 501.5 405.5 480 432 480C458.5 480 480 501.5 480 528C480 554.5 458.5 576 432 576C405.5 576 384 554.5 384 528z"/></svg>
            <div class="counter_box" id="counterBox">
                <p style="color: white;" id="quantity"></p>
            </div>
        </div>
    </main>
    <script>
        let cartQuantity = 0;
        function addToCart(){
            cartQuantity++;
            document.getElementById('quantity').innerText = cartQuantity;
            document.getElementById('counterBox').style.display = "flex";
        }
        function removeOne(){
            if(cartQuantity > 1){
                cartQuantity--;
                document.getElementById('quantity').innerText = cartQuantity;
            }else{
                document.getElementById('counterBox').style.display = "none";
            }

        }
        function reset(){
            cartQuantity = 0;
            document.getElementById('quantity').innerText='';
            document.getElementById('counterBox').style.display = "none";
        }
        
    </script>
</body>
</html>
